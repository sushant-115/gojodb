# docker-compose.yml
# This file sets up a 3-node GojoDB cluster with a single gateway.
#
# To run:
# 1. Build the Docker images: docker-compose build
# 2. Start the cluster: docker-compose up -d
#
# To shutdown:
# docker-compose down
#
# Memory layout on a c5a.4xlarge (32 GB):
#   3 × gojodb-server : 3 × 4 GB  = 12 GB
#   gojodb-gateway    :     1 GB  =  1 GB
#   gojodb-controller :   512 MB  =  0.5 GB
#   jaeger            :   1.5 GB  =  1.5 GB
#   OS + Docker daemon:           ~  3 GB
#   Headroom / swap   :           ~ 14 GB
#
# IMPORTANT: Before starting, add swap on the EC2 host so OOM does not
# hard-lock the instance:
#   sudo fallocate -l 8G /swapfile && sudo chmod 600 /swapfile
#   sudo mkswap /swapfile && sudo swapon /swapfile
#   echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab

version: '3.8'

networks:
  gojodb-net:
    driver: bridge

x-server-resources: &server-resources
  mem_limit: 4g
  memswap_limit: 4g    # disable swap for this container (swap=mem means no swap)
  cpus: '4'

x-server-env: &server-env
  # Hard cap on Go heap.  Leave ~512 MiB headroom for non-heap allocations
  # (goroutine stacks, OS threads, cgo, etc.).
  GOMEMLIMIT: 3584MiB
  # Tune GC: 50% → collect more aggressively; reduces peak heap at slight CPU cost.
  GOGC: "50"

services:
  # Jaeger — use badger (disk-backed) storage so traces do not fill RAM.
  jaeger-all-in-one:
    image: jaegertracing/all-in-one:latest
    environment:
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=true
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP gRPC endpoint
    networks:
      - gojodb-net
    mem_limit: 1500m
    memswap_limit: 1500m
    cpus: '1'

  # --- GojoDB Storage Nodes ---
  gojodb-server-1:
    image: gojodb-server
    build:
      context: .
      dockerfile: ./cmd/gojodb_server/Dockerfile
      args:
        COMPONENT_PATH: ./cmd/gojodb_server
    networks:
      - gojodb-net
    ports:
      - "8001:8001" # gRPC
      - "7001:7001" # Raft
      - "9001:9001" # HTTP
      - "6001:6001/udp" # Replication
      - "8083:8083" # Heartbeat
    volumes:
      - ./data/node1:/data
    environment:
      <<: *server-env
    command:
      - "/app/app"
      - "--node_id=node-1"
      - "--log_file=/tmp/node1"
      - "--grpc_addr=gojodb-server-1:8001"
      - "--raft_addr=gojodb-server-1:7001"
      - "--http_addr=gojodb-server-1:9001"
      - "--replication_addr=gojodb-server-1:6001"
      - "--heartbeat_addr=gojodb-server-1:8083"
      - "--controller_addr=gojodb-server-1:9001"
      - "--bootstrap"
      - "--oltp_endpoint=jaeger-all-in-one:4317"
      - "--buffer_pool_size=500"
    healthcheck:
      test: ["CMD", "sh", "-c", "sleep 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    <<: *server-resources

  gojodb-server-2:
    image: gojodb-server
    build:
      context: .
      dockerfile: ./cmd/gojodb_server/Dockerfile
      args:
        COMPONENT_PATH: ./cmd/gojodb_server
    networks:
      - gojodb-net
    ports:
      - "8002:8002"
      - "7002:7002"
      - "9002:9002"
      - "6002:6002/udp"
      - "8084:8084"
    volumes:
      - ./data/node2:/data
    environment:
      <<: *server-env
    command:
      - "/app/app"
      - "--node_id=node-2"
      - "--log_file=/tmp/node2"
      - "--grpc_addr=gojodb-server-2:8002"
      - "--raft_addr=gojodb-server-2:7002"
      - "--http_addr=gojodb-server-2:9002"
      - "--replication_addr=gojodb-server-2:6002"
      - "--heartbeat_addr=gojodb-server-2:8084"
      - "--controller_addr=gojodb-server-1:9001"
      - "--oltp_endpoint=jaeger-all-in-one:4317"
      - "--buffer_pool_size=500"
    depends_on:
      gojodb-server-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "sleep 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    <<: *server-resources

  gojodb-server-3:
    image: gojodb-server
    build:
      context: .
      dockerfile: ./cmd/gojodb_server/Dockerfile
      args:
        COMPONENT_PATH: ./cmd/gojodb_server
    networks:
      - gojodb-net
    ports:
      - "8003:8003"
      - "7003:7003"
      - "9003:9003"
      - "6003:6003/udp"
      - "8085:8085"
    volumes:
      - ./data/node3:/data
    environment:
      <<: *server-env
    command:
      - "/app/app"
      - "--node_id=node-3"
      - "--log_file=/tmp/node3"
      - "--grpc_addr=gojodb-server-3:8003"
      - "--raft_addr=gojodb-server-3:7003"
      - "--http_addr=gojodb-server-3:9003"
      - "--replication_addr=gojodb-server-3:6003"
      - "--heartbeat_addr=gojodb-server-3:8085"
      - "--controller_addr=gojodb-server-1:9001"
      - "--oltp_endpoint=jaeger-all-in-one:4317"
      - "--buffer_pool_size=500"
    depends_on:
      gojodb-server-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "sleep 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    <<: *server-resources

  # --- GojoDB Gateway ---
  gojodb-gateway:
    image: gojodb-gateway
    build:
      context: .
      dockerfile: ./cmd/gojodb_gateway/Dockerfile
      args:
        COMPONENT_PATH: ./cmd/gojodb_gateway
    networks:
      - gojodb-net
    ports:
      - "50051:50051" # Client-facing gRPC port
      - "9112:9112"
    environment:
      - CLUSTER_NODES=gojodb-server-1:8001,gojodb-server-2:8002,gojodb-server-3:8003
      - LISTEN_ADDR=:7000
      - GOMEMLIMIT=768MiB
      - GOGC=50
    command: ["/app/app", "--controller_addr=gojodb-server-1:9001", "--oltp_endpoint=jaeger-all-in-one:4317"]
    depends_on:
      gojodb-server-1:
        condition: service_healthy
      gojodb-server-2:
        condition: service_healthy
      gojodb-server-3:
        condition: service_healthy
    mem_limit: 1g
    memswap_limit: 1g
    cpus: '2'

volumes:
  node1-data:
  node2-data:
  node3-data:
